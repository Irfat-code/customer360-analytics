# =============================================================================
# CUSTOMER360 INTELLIGENCE PLATFORM
# Docker Compose — Full Stack
# Services: PostgreSQL, Airflow, dbt, Metabase
# =============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  volumes:
    - ./ingestion/dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - ./scripts:/opt/airflow/scripts
    - ./marts/customer360:/opt/airflow/scripts/dbt_project
    - ./marts/profiles.yml:/opt/airflow/scripts/profiles.yml
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - customer360

services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL — Main warehouse + Airflow metadata database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: c360_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: customer360
      POSTGRES_DB: customer360
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - customer360

  # ---------------------------------------------------------------------------
  # AIRFLOW INIT — Runs once to set up Airflow DB and admin user
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: c360_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@customer360.com
    restart: "no"

  # ---------------------------------------------------------------------------
  # AIRFLOW WEBSERVER
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: c360_airflow_webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # AIRFLOW SCHEDULER
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: c360_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # DBT — Transformation layer (runs as a service for ad-hoc commands)
  # ---------------------------------------------------------------------------
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: c360_dbt
    restart: "no"
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
    volumes:
      - ./marts:/usr/app/dbt
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - customer360
    entrypoint: ["tail", "-f", "/dev/null"]

  # ---------------------------------------------------------------------------
  # METABASE — Open-source BI / dashboards
  # ---------------------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: c360_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: customer360
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - customer360

# =============================================================================
# VOLUMES & NETWORKS
# =============================================================================
volumes:
  postgres_data:
    driver: local

networks:
  customer360:
    driver: bridge